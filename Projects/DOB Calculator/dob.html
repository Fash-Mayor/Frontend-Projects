<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <!-- Main calculator container -->
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-lg space-y-6">
        <h1 class="text-4xl font-extrabold text-gray-800 text-center">Age Calculator</h1>

        <!-- Input Section -->
        <div class="flex flex-col sm:flex-row gap-4">
            <!-- Day Input -->
            <div class="flex-1">
                <label for="day" class="block text-gray-600 font-semibold mb-2">Day</label>
                <input type="number" id="day" placeholder="DD" min="1" max="31" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-sky-500 transition-all duration-300 text-lg">
            </div>
            
            <!-- Month Input -->
            <div class="flex-1">
                <label for="month" class="block text-gray-600 font-semibold mb-2">Month</label>
                <select id="month" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-sky-500 transition-all duration-300 text-lg">
                    <option value="" disabled selected>MM</option>
                    <option value="1">January</option>
                    <option value="2">February</option>
                    <option value="3">March</option>
                    <option value="4">April</option>
                    <option value="5">May</option>
                    <option value="6">June</option>
                    <option value="7">July</option>
                    <option value="8">August</option>
                    <option value="9">September</option>
                    <option value="10">October</option>
                    <option value="11">November</option>
                    <option value="12">December</option>
                </select>
            </div>
            
            <!-- Year Input -->
            <div class="flex-1">
                <label for="year" class="block text-gray-600 font-semibold mb-2">Year</label>
                <input type="number" id="year" placeholder="YYYY" min="1900" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-sky-500 transition-all duration-300 text-lg">
            </div>
        </div>

        <!-- Button and Error Message -->
        <div class="flex flex-col items-center gap-4">
            <button id="calculateBtn" class="w-full sm:w-auto px-8 py-3 bg-sky-600 text-white font-bold text-xl rounded-xl shadow-lg hover:bg-sky-700 focus:outline-none focus:ring-4 focus:ring-sky-300 transition-all duration-300 transform hover:scale-105">
                Calculate Age
            </button>
            <p id="errorMsg" class="text-red-500 font-medium hidden">Please enter a valid date of birth.</p>
        </div>

        <!-- Result Section -->
        <div class="space-y-4 pt-6 text-center">
            <div id="result" class="text-4xl font-extrabold text-gray-900 leading-tight">
                <!-- Result will be displayed here -->
            </div>
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const dayInput = document.getElementById('day');
            const monthInput = document.getElementById('month');
            const yearInput = document.getElementById('year');
            const calculateBtn = document.getElementById('calculateBtn');
            const resultDiv = document.getElementById('result');
            const errorMsg = document.getElementById('errorMsg');

            calculateBtn.addEventListener('click', () => {
                const day = parseInt(dayInput.value);
                const month = parseInt(monthInput.value);
                const year = parseInt(yearInput.value);

                // Basic validation
                if (!day || !month || !year || day > 31 || month > 12) {
                    errorMsg.classList.remove('hidden');
                    resultDiv.innerHTML = '';
                    return;
                }

                const birthDate = new Date(year, month - 1, day);
                const today = new Date();

                // Check for invalid date (e.g., Feb 30) or future date
                if (birthDate.getDate() !== day || birthDate.getMonth() !== month - 1 || birthDate > today) {
                    errorMsg.classList.remove('hidden');
                    resultDiv.innerHTML = '';
                    return;
                }

                errorMsg.classList.add('hidden');

                let ageYears = today.getFullYear() - birthDate.getFullYear();
                let ageMonths = today.getMonth() - birthDate.getMonth();
                let ageDays = today.getDate() - birthDate.getDate();

                // Adjust for negative months and days
                if (ageDays < 0) {
                    ageMonths--;
                    ageDays += new Date(today.getFullYear(), today.getMonth(), 0).getDate();
                }

                if (ageMonths < 0) {
                    ageYears--;
                    ageMonths += 12;
                }
                
                resultDiv.innerHTML = `<span class="text-sky-600">${ageYears}</span> years, <span class="text-sky-600">${ageMonths}</span> months, and <span class="text-sky-600">${ageDays}</span> days old.`;
            });
        });
    </script>

</body>
</html>
